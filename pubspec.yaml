name: menu_map
description: "A culinary map application for Chinese cuisine exploration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.5
  html: ^0.15.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  test: any


flutter:
  assets:
    - assets/china_map.jpg
    - test/assets/dish_response.json

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
